version: '3.9'

services:
  # ─── DevOps Command Center App ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: devops-command-center:latest
    container_name: devops-command-center
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - APP_NAME=${APP_NAME:-DevOps Command Center}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - API_KEY=${API_KEY:-change-me-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-900000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
    volumes:
      - app-logs:/app/logs
    networks:
      - devops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on: []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.devops.rule=Host(`devops.yourdomain.com`)"
      - "com.docker.compose.project=devops-command-center"

  # ─── Nginx Reverse Proxy (Optional) ────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: devops-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    networks:
      - devops-network
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - with-nginx

# ─── Networks ──────────────────────────────────────────────────────────────
networks:
  devops-network:
    driver: bridge
    name: devops-network

# ─── Volumes ───────────────────────────────────────────────────────────────
volumes:
  app-logs:
    driver: local
    name: devops-app-logs
  nginx-logs:
    driver: local
    name: devops-nginx-logs
